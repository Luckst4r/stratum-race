server {
    listen 80;
    listen [::]:80;
    server_name stratumrace.com www.stratumrace.com;

    root /var/www/stratumrace;
    index index.html;

    # Leaderboard data must always be fresh.
    location /data/ {
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
